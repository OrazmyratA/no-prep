<aside class="reader-page-drawer" (scroll)="reader.onReaderThumbScroll($event)">
  <button type="button" class="reader-drawer-handle collapse" (click)="reader.togglePageDrawer()" title="Hide pages" aria-label="Hide pages">
    <img class="drawer-toggle-icon drawer-toggle-hide" src="assets/images/book/hide.png" alt="">
  </button>
  <div class="virtual-spacer" [style.height.px]="reader.readerVirtualTopPadding"></div>
  <button
    *ngFor="let item of reader.readerVirtualPages; trackBy: reader.trackByVirtualPageId"
    type="button"
    class="reader-page-option a4-reader-thumb"
    [class.selected]="item.index === reader.currentPageIndex"
    (click)="reader.goToPage(item.index)"
    [attr.aria-label]="'readerGoToPageNumber' | translate: {number: item.index + 1}">
    <div class="reader-thumb-page">
      <app-pdf-page-canvas
        *ngIf="item.page.type === 'pdf' && reader.getPagePdfUrl(item.page)"
        [sourceUrl]="reader.getPagePdfUrl(item.page)"
        [pageNumber]="item.page.pdfPage || 1"
        [rotation]="reader.getPageRotation(item.page)"
        [renderScale]="0.22"
        [lazy]="true">
      </app-pdf-page-canvas>
      <div class="reader-thumb-blank" *ngIf="item.page.type === 'blank'"></div>
    </div>
    <span class="reader-thumb-number">{{ item.index + 1 }}</span>
    <span class="reader-thumb-source" *ngIf="reader.pageSource === 'workbook'">
      <img src="assets/images/book/switch-book.png" alt="">
    </span>
  </button>
  <div class="virtual-spacer" [style.height.px]="reader.readerVirtualBottomPadding"></div>
</aside>
