<div class="book-reader-page">
  <app-book-reader-toolbar [reader]="readerContext"></app-book-reader-toolbar>

  <app-book-reader-task-overlay [reader]="readerContext"></app-book-reader-task-overlay>

  <main #readerStage class="reader-stage" [class.drawer-open]="pageDrawerOpen" [class.zoomed]="zoom > 1">
    <app-book-reader-page-drawer *ngIf="pageDrawerOpen" [reader]="readerContext"></app-book-reader-page-drawer>
    <div *ngIf="loading" class="reader-message">{{ 'readerLoadingBook' | translate }}</div>
    <div *ngIf="!loading && !book" class="reader-message">{{ 'readerBookNotFound' | translate }}</div>
    <div *ngIf="!loading && book && !currentPage" class="reader-message">{{ 'readerNoVisiblePages' | translate }}</div>

    <div #readerCanvasShell *ngIf="book && currentPage" class="reader-canvas-shell">
      <button
        *ngIf="!expandedFocusElement"
        type="button"
        class="reader-page-edge previous"
        (click)="$event.stopPropagation(); previousPage()"
        [disabled]="currentPageIndex <= 0"
        [title]="'previousPage' | translate"
        [attr.aria-label]="'previousPage' | translate">
        <img class="turn-icon turn-icon-previous" src="assets/images/book/hide.png" alt="">
      </button>

      <div
        #readerSpread
        class="reader-spread"
        [class.two-page]="twoPageMode && companionPage && !expandedFocusElement"
        [class.zoomed]="zoom > 1"
        [class.focus-crop-active]="expandedFocusElement"
        [style.width.px]="readerSpreadWidthPx">
        <app-book-reader-page-frame
          [reader]="readerContext"
          [page]="currentPage"
          [pdfUrl]="pdfUrl"
          [primary]="true">
        </app-book-reader-page-frame>

        <app-book-reader-page-frame
          *ngIf="twoPageMode && !expandedFocusElement && companionPage as sidePage"
          [reader]="readerContext"
          [page]="sidePage"
          [pdfUrl]="getPagePdfUrl(sidePage)"
          [companion]="true">
        </app-book-reader-page-frame>
      </div>

      <button
        *ngIf="!expandedFocusElement"
        type="button"
        class="reader-page-edge next"
        (click)="$event.stopPropagation(); nextPage()"
        [disabled]="currentPageIndex >= visiblePages.length - 1"
        [title]="'nextPage' | translate"
        [attr.aria-label]="'nextPage' | translate">
        <img class="turn-icon turn-icon-next" src="assets/images/book/show.png" alt="">
      </button>
    </div>
  </main>

  <div
    class="guide-pin-media-overlay"
    [class.visible]="guideOverlayVisible"
    *ngIf="guideOverlayImageUrl">
    <div #guidePinMediaFrame class="guide-pin-media-frame">
      <img [src]="guideOverlayImageUrl" alt="">
    </div>
  </div>

  <img
    class="owl-guide"
    [class.teaching]="owlTeaching"
    [src]="owlImage"
    [style.left.px]="owlX"
    [style.top.px]="owlY"
    [attr.alt]="'readerTeacherOwl' | translate">

  <div class="reader-popover-backdrop" [class.video-fullscreen]="videoFullscreen" *ngIf="expandedElement" (click)="closeExpandedElement()">
    <div class="reader-popover" [class.video-fullscreen]="videoFullscreen" (click)="$event.stopPropagation()">
      <button type="button" class="popover-close" (click)="closeExpandedElement()" [attr.aria-label]="'close' | translate">X</button>
      <div
        #expandedVideoFrame
        class="expanded-video-frame"
        [class.video-fullscreen]="videoFullscreen"
        (click)="$event.stopPropagation()"
        (pointerdown)="$event.stopPropagation()"
        (pointerup)="onExpandedVideoPointerUp($event)"
        *ngIf="expandedElement.type === 'video' && !isYouTubeVideo(expandedElement)">
        <video
          #expandedVideo
          [src]="getElementMediaUrl(expandedElement)"
          controls
          controlsList="nodownload"
          autoplay
          (fullscreenchange)="onExpandedNativeVideoFullscreenChange()"
          (webkitfullscreenchange)="onExpandedNativeVideoFullscreenChange()"
          (webkitbeginfullscreen)="onExpandedNativeVideoFullscreenChange()"
          (webkitendfullscreen)="onExpandedNativeVideoFullscreenChange()">
        </video>
      </div>
      <div class="video-seek-controls" *ngIf="expandedElement.type === 'video' && !isYouTubeVideo(expandedElement)">
        <button type="button" (click)="skipExpandedVideo(-1)">-1s</button>
        <button
          type="button"
          class="video-seek-fullscreen"
          (pointerdown)="onExpandedVideoFullscreenHotspotPointerDown($event)"
          (pointerup)="onExpandedVideoFullscreenHotspotPointerUp($event)"
          (click)="onExpandedVideoFullscreenHotspotClick($event)"
          aria-label="Fullscreen"
          title="Fullscreen">
          <img src="assets/images/maximize.png" alt="">
        </button>
        <button type="button" (click)="skipExpandedVideo(1)">+1s</button>
      </div>
      <div
        #expandedVideoFrame
        class="expanded-video-frame youtube-video-frame"
        [class.video-fullscreen]="videoFullscreen"
        *ngIf="expandedElement.type === 'video' && isYouTubeVideo(expandedElement)">
        <iframe
          [src]="getYouTubeEmbedUrl(expandedElement)"
          [attr.title]="'readerYoutubeVideo' | translate"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; fullscreen; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
          webkitallowfullscreen
          mozallowfullscreen>
        </iframe>
      </div>
      <div class="youtube-fallback" *ngIf="expandedElement.type === 'video' && isYouTubeVideo(expandedElement)">
        <button type="button" (click)="openVideoExternally(expandedElement)">
          {{ 'readerWatchYoutube' | translate }}
        </button>
      </div>
      <div class="expanded-note" *ngIf="expandedElement.type === 'note'">
        {{ getElementText(expandedElement) }}
      </div>
      <div class="expanded-answer-key" *ngIf="expandedElement.type === 'answerKey'">
        <img *ngIf="expandedElement.data['src']; else answerKeyUnavailable" [src]="getElementAssetUrl(expandedElement)" alt="Answer key">
        <ng-template #answerKeyUnavailable>
          <div class="answer-key-unavailable">Answer image unavailable.</div>
        </ng-template>
      </div>
    </div>
  </div>

  <div class="reader-popover-backdrop legacy-focus-popover" *ngIf="false">
    <div class="focus-zoom-modal" (click)="$event.stopPropagation()">
      <button type="button" class="popover-close" (click)="closeExpandedFocus()" [attr.aria-label]="'close' | translate">X</button>
      <div class="focus-zoom-frame" [style.aspect-ratio]="pageAspectRatio">
        <div class="focus-zoom-content" [style.transform]="getFocusZoomTransform(expandedFocusElement)">
          <app-pdf-page-canvas
            *ngIf="expandedFocusPage?.type === 'pdf' && getPagePdfUrl(expandedFocusPage!)"
            [sourceUrl]="getPagePdfUrl(expandedFocusPage!)"
            [pageNumber]="expandedFocusPage?.pdfPage || 1"
            [rotation]="getPageRotation(expandedFocusPage)"
            [renderScale]="2">
          </app-pdf-page-canvas>
          <div *ngIf="expandedFocusPage?.type === 'blank'" class="blank-page"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<app-book-reader-guide-audio-controls [reader]="readerContext"></app-book-reader-guide-audio-controls>
<app-book-reader-speaking-panel [reader]="readerContext"></app-book-reader-speaking-panel>
