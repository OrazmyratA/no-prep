<div class="book-reader-page">
  <app-book-reader-toolbar [reader]="readerContext"></app-book-reader-toolbar>

  <app-book-reader-task-overlay [reader]="readerContext"></app-book-reader-task-overlay>

  <main #readerStage class="reader-stage" [class.drawer-open]="pageDrawerOpen" [class.zoomed]="zoom > 1">
    <app-book-reader-page-drawer *ngIf="pageDrawerOpen" [reader]="readerContext"></app-book-reader-page-drawer>
    <div *ngIf="loading" class="reader-message">{{ 'readerLoadingBook' | translate }}</div>
    <div *ngIf="!loading && !book" class="reader-message">{{ 'readerBookNotFound' | translate }}</div>
    <div *ngIf="!loading && book && !currentPage" class="reader-message">{{ 'readerNoVisiblePages' | translate }}</div>

    <div #readerCanvasShell *ngIf="book && currentPage" class="reader-canvas-shell">
      <button
        *ngIf="!expandedFocusElement"
        type="button"
        class="reader-page-edge previous"
        (click)="$event.stopPropagation(); previousPage()"
        [disabled]="currentPageIndex <= 0"
        [title]="'previousPage' | translate"
        [attr.aria-label]="'previousPage' | translate">
        <img class="turn-icon turn-icon-previous" src="assets/images/book/hide.png" alt="">
      </button>

      <div
        #readerSpread
        class="reader-spread"
        [class.two-page]="twoPageMode && companionPage && !expandedFocusElement"
        [class.zoomed]="zoom > 1"
        [class.focus-crop-active]="expandedFocusElement"
        [style.width.px]="readerSpreadWidthPx">
      <div
        #pageFrame
        class="page-frame"
        [class.screenshotting]="screenshotting"
        [class.delete-mode]="deleteMode"
        [class.focus-crop-page]="isFocusCropActive(currentPage)"
        (click)="onPageFrameClick($event)"
        appSwipe
        [swipeDisabled]="isInkModeActive() || textMode"
        (swipeLeft)="nextPage()"
        (swipeRight)="previousPage()"
        (pointerup)="onPageFramePointerUp($event)"
        [attr.data-page-id]="currentPage.id"
        [style.aspect-ratio]="getPageAspectRatioFor(currentPage)"
        [style.background]="currentPage.backgroundColor || '#ffffff'">
        <div
          class="page-content"
          [class.focus-crop-content]="isFocusCropActive(currentPage)"
          [ngStyle]="getFocusContentStyle(currentPage)">
          <app-pdf-page-canvas
            *ngIf="pdfUrl && currentPage.type === 'pdf'"
            [sourceUrl]="pdfUrl"
            [pageNumber]="currentPage.pdfPage || 1"
            [rotation]="getPageRotation(currentPage)"
            [renderScale]="isFocusCropActive(currentPage) ? 2.6 : 1.7"
            (pageSize)="onPdfPageSize($event)">
          </app-pdf-page-canvas>

          <div *ngIf="currentPage.type === 'blank'" class="blank-page"></div>

          <canvas
            #drawingCanvas
            class="drawing-layer"
            [attr.data-page-id]="currentPage.id"
            [class.active]="isInkModeActive()"
            (pointerdown)="startDrawing($event)"
            (pointermove)="continueDrawing($event)"
            (pointerup)="stopDrawing()"
            (pointercancel)="stopDrawing()"
            (pointerleave)="stopDrawing()">
          </canvas>

          <div
            *ngIf="textMode"
            class="text-placement-layer"
            (pointerdown)="placeTextFromEvent($event)">
          </div>

        <div
          *ngIf="isTextInputForPage(currentPage)"
          class="reader-text-editor"
          [attr.data-page-id]="currentPage.id"
          [style.left.%]="activeTextInput!.x * 100"
          [style.top.%]="activeTextInput!.y * 100"
          [style.width.%]="activeTextInput!.width * 100"
          [style.height.%]="activeTextInput!.height * 100"
          [style.color]="activeTextInput!.color">
          <button
            type="button"
            class="reader-text-move"
            (pointerdown)="startTextEditorDrag($event)"
            [title]="'readerMoveText' | translate"
            [attr.aria-label]="'readerMoveText' | translate"></button>
          <textarea
            class="reader-inline-text-input"
            [(ngModel)]="activeTextInput!.value"
            (keydown.enter)="commitTextInputFromKey($event)"
            (keydown.escape)="cancelTextInput()"
            (blur)="commitTextInput($event)"
            [attr.placeholder]="'textOptional' | translate"></textarea>
        </div>

        <div
          *ngFor="let text of getPageTexts(currentPage)"
          class="temporary-text"
          [class.selected]="isTextSelected(currentPage, text)"
          [class.delete-target]="deleteMode"
          [attr.data-page-id]="currentPage.id"
          [attr.data-text-id]="text.id"
          [style.left.%]="text.x * 100"
          [style.top.%]="text.y * 100"
          [style.width.%]="(text.width || 0.22) * 100"
          [style.height.%]="(text.height || 0.055) * 100"
          [style.color]="text.color || '#111827'"
          [style.--text-scale]="text.height || 0.055"
          (click)="selectTextAnnotation(currentPage, text, $event)"
          (pointerdown)="startSavedTextDrag(currentPage, text, $event)">
          <img *ngIf="text.imageDataUrl" [src]="text.imageDataUrl" alt="">
          <span *ngIf="!text.imageDataUrl">{{ text.text }}</span>
        </div>

        <svg
          *ngFor="let stroke of getPageStrokes(currentPage)"
          class="stroke-delete-target"
          [style.display]="deleteMode ? 'block' : 'none'"
          viewBox="0 0 1 1"
          preserveAspectRatio="none"
          (click)="deleteStrokeAnnotation(currentPage, stroke, $event)"
          [attr.title]="'readerDeleteDrawing' | translate"
          [attr.aria-label]="'readerDeleteDrawing' | translate">
          <polyline
            [attr.points]="getStrokePolylinePoints(stroke)"
            fill="none"
            vector-effect="non-scaling-stroke"></polyline>
        </svg>

        <svg class="match-line-layer" viewBox="0 0 1 1" preserveAspectRatio="none" aria-hidden="true">
          <line
            *ngFor="let line of getMatchLines(currentPage); trackBy: trackByMatchLine"
            [class.correct]="line.result === 'correct'"
            [class.incorrect]="line.result === 'incorrect'"
            [attr.x1]="getMatchEndpointCenterX(line.source)"
            [attr.y1]="getMatchEndpointCenterY(line.source)"
            [attr.x2]="getMatchEndpointCenterX(line.target)"
            [attr.y2]="getMatchEndpointCenterY(line.target)"
            vector-effect="non-scaling-stroke">
          </line>
        </svg>

        <div
          *ngFor="let element of currentPage.elements; trackBy: trackByElementId"
          class="reader-element"
          [class.focus-element]="element.type === 'focus'"
          [class.focus-visible]="focusMode && element.type === 'focus'"
          [class.dot-element]="element.type === 'guideDot'"
          [class.dot-disabled]="element.type === 'guideDot' && !isGuideDotEnabled(element, currentPage)"
          [class.dot-paused]="element.id === pausedGuideElementId"
          [class.speaking-ai-element]="element.type === 'speakingAi'"
          [class.speaking-ai-disabled]="element.type === 'speakingAi' && !isSpeakingAiEnabled(element, currentPage)"
          [class.speaking-ai-active]="element.type === 'speakingAi' && activeSpeakingElement?.id === element.id"
          [class.note-element]="element.type === 'note'"
          [class.answer-key-element]="element.type === 'answerKey'"
          [class.ink-element]="element.type === 'ink'"
          [class.highlighter-element]="element.type === 'highlighter'"
          [class.text-mark-element]="element.type === 'text'"
          [class.game-element]="element.type === 'game'"
          [class.text-task-element]="element.type === 'textTask'"
          [class.choice-task-element]="element.type === 'choiceTask'"
          [class.circle-task-element]="element.type === 'circleTask'"
          [class.circle-selected]="element.type === 'circleTask' && isCircleTaskSelected(element)"
          [class.match-task-element]="element.type === 'matchTask'"
          [class.match-side-a]="element.type === 'matchTask' && element.data['side'] === 'A'"
          [class.match-side-b]="element.type === 'matchTask' && element.data['side'] === 'B'"
          [class.match-selected]="element.type === 'matchTask' && isMatchEndpointSelected(element, currentPage)"
          [class.match-available]="element.type === 'matchTask' && isMatchEndpointAvailable(element, currentPage)"
          [class.match-connected]="element.type === 'matchTask' && isMatchEndpointConnected(element, currentPage)"
          [class.match-missing]="element.type === 'matchTask' && isMatchEndpointMissing(element, currentPage)"
          [class.task-active]="(element.type === 'textTask' || element.type === 'choiceTask') && activeTaskElement?.id === element.id"
          [class.task-correct]="(element.type === 'textTask' || element.type === 'choiceTask' || element.type === 'circleTask') && getTaskResult(element) === 'correct'"
          [class.task-incorrect]="(element.type === 'textTask' || element.type === 'choiceTask' || element.type === 'circleTask') && getTaskResult(element) === 'incorrect'"
          [class.hidden-focus]="element.type === 'focus' && !focusMode"
          [style.left.%]="element.x * 100"
          [style.top.%]="element.y * 100"
          [style.width.%]="(element.width || 0.08) * 100"
          [style.height.%]="(element.height || 0.08) * 100"
          (click)="activateElement(element, $event, currentPage)">
          <img *ngIf="element.type === 'image'" [src]="getElementAssetUrl(element)" [alt]="getElementText(element)">
          <img *ngIf="element.type === 'video'" class="book-marker-icon" src="assets/images/book/video.png" [alt]="'bookMarkerVideo' | translate">
          <span *ngIf="element.type === 'focus'" class="focus-label"></span>
          <img *ngIf="element.type === 'game'" class="book-marker-icon" src="assets/images/book/game.png" [alt]="'bookMarkerGame' | translate">
          <img *ngIf="element.type === 'guideDot'" class="book-marker-icon teacher-marker-icon" src="assets/images/book/teacher.png" [alt]="'bookMarkerTeacherGuide' | translate">
          <span *ngIf="element.type === 'speakingAi'" class="speaking-ai-marker">
            <img class="book-marker-icon" src="assets/images/book/speaking.png" alt="AI speaking">
          </span>
          <span *ngIf="element.type === 'note'" class="note-marker">
            <img class="book-marker-icon" src="assets/images/book/note.png" [alt]="'bookMarkerNote' | translate">
          </span>
          <svg *ngIf="element.type === 'ink' && element.data['points']; else readerInkFallback" class="teacher-stroke-svg" viewBox="0 0 1 1" preserveAspectRatio="none" aria-hidden="true">
            <polyline [attr.points]="getElementPolylinePoints(element)" fill="none" [attr.stroke]="element.data['color'] || '#2563eb'" [attr.stroke-width]="element.data['strokePx'] || 6" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></polyline>
          </svg>
          <ng-template #readerInkFallback>
            <span *ngIf="element.type === 'ink'" class="ink-mark" [style.background]="element.data['color'] || '#2563eb'"></span>
          </ng-template>
          <svg *ngIf="element.type === 'highlighter' && element.data['points']; else readerHighlighterFallback" class="teacher-stroke-svg highlighter-stroke-svg" viewBox="0 0 1 1" preserveAspectRatio="none" aria-hidden="true">
            <polyline [attr.points]="getElementPolylinePoints(element)" fill="none" [attr.stroke]="element.data['color'] || '#fde047'" [attr.stroke-width]="element.data['strokePx'] || 18" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></polyline>
          </svg>
          <ng-template #readerHighlighterFallback>
            <span *ngIf="element.type === 'highlighter'" class="highlighter-mark" [style.background]="element.data['color'] || '#fde047'"></span>
          </ng-template>
          <span *ngIf="element.type === 'text'" class="teacher-text-mark" [style.color]="element.data['color'] || '#111827'">
            <img *ngIf="element.data['imageDataUrl']" [src]="element.data['imageDataUrl']" alt="">
            <span *ngIf="!element.data['imageDataUrl']">{{ element.data['text'] || 'Text' }}</span>
          </span>
          <img *ngIf="element.type === 'answerKey'" class="book-marker-icon" src="assets/images/book/answer key.png" alt="Answer key">
          <input
            *ngIf="element.type === 'textTask' && !shouldUseTaskDock(element)"
            type="text"
            class="text-task-input"
            [ngModel]="getTaskResponseValue(element)"
            (focus)="activateTextTask(element, currentPage, $event)"
            (click)="$event.stopPropagation()"
            (ngModelChange)="updateTaskResponse(element, currentPage, $event)"
            aria-label="Student answer">
          <button
            *ngIf="element.type === 'textTask' && shouldUseTaskDock(element)"
            type="button"
            class="text-task-tap"
            (click)="activateTextTask(element, currentPage, $event)"
            aria-label="Enter student answer">
            <span>{{ getTaskResponseValue(element) }}</span>
          </button>
          <button
            *ngIf="element.type === 'choiceTask'"
            type="button"
            class="choice-task-tap"
            (click)="activateChoiceTask(element, currentPage, $event)"
            aria-label="Choose a word-bank answer">
            <span>{{ getChoiceTaskDisplayValue(element, currentPage) }}</span>
          </button>
          <button
            *ngIf="element.type === 'circleTask'"
            type="button"
            class="circle-task-tap"
            [attr.aria-pressed]="isCircleTaskSelected(element)"
            (click)="toggleCircleTask(element, currentPage, $event)"
            aria-label="Select circling answer">
          </button>
          <button
            *ngIf="element.type === 'matchTask'"
            type="button"
            class="match-task-tap"
            [attr.aria-pressed]="isMatchEndpointSelected(element, currentPage)"
            [attr.aria-disabled]="!isMatchEndpointAvailable(element, currentPage)"
            (click)="activateMatchEndpoint(element, currentPage, $event)"
            aria-label="Select matching endpoint">
            <span></span>
          </button>
        </div>

          <button
            type="button"
            class="guide-bubble"
            [class.expanded]="guideBubbleExpanded"
            *ngIf="guideBubbleText"
            (click)="toggleGuideBubble($event)"
            [title]="(guideBubbleExpanded ? 'readerCollapseTeacherText' : 'readerExpandTeacherText') | translate">
            {{ guideBubbleText }}
          </button>
        </div>
      </div>

      <div
        *ngIf="twoPageMode && !expandedFocusElement && companionPage as sidePage"
        class="page-frame companion-page-frame"
        [class.delete-mode]="deleteMode"
        (click)="onPageFrameClick($event)"
        appSwipe
        [swipeDisabled]="isInkModeActive() || textMode"
        (swipeLeft)="nextPage()"
        (swipeRight)="previousPage()"
        (pointerup)="onPageFramePointerUp($event)"
        [attr.data-page-id]="sidePage.id"
        [style.aspect-ratio]="getPageAspectRatioFor(sidePage)"
        [style.background]="sidePage.backgroundColor || '#ffffff'">
        <div class="page-content">
          <app-pdf-page-canvas
            *ngIf="sidePage.type === 'pdf' && getPagePdfUrl(sidePage)"
            [sourceUrl]="getPagePdfUrl(sidePage)"
            [pageNumber]="sidePage.pdfPage || 1"
            [rotation]="getPageRotation(sidePage)"
            [renderScale]="1.35">
          </app-pdf-page-canvas>

          <div *ngIf="sidePage.type === 'blank'" class="blank-page"></div>

          <canvas
            #drawingCanvas
            class="drawing-layer"
            [attr.data-page-id]="sidePage.id"
            [class.active]="isInkModeActive()"
            (pointerdown)="startDrawing($event)"
            (pointermove)="continueDrawing($event)"
            (pointerup)="stopDrawing()"
            (pointercancel)="stopDrawing()"
            (pointerleave)="stopDrawing()">
          </canvas>

          <div
            *ngIf="textMode"
            class="text-placement-layer"
            (pointerdown)="placeTextFromEvent($event)">
          </div>

        <div
          *ngIf="isTextInputForPage(sidePage)"
          class="reader-text-editor"
          [attr.data-page-id]="sidePage.id"
          [style.left.%]="activeTextInput!.x * 100"
          [style.top.%]="activeTextInput!.y * 100"
          [style.width.%]="activeTextInput!.width * 100"
          [style.height.%]="activeTextInput!.height * 100"
          [style.color]="activeTextInput!.color">
          <button
            type="button"
            class="reader-text-move"
            (pointerdown)="startTextEditorDrag($event)"
            [title]="'readerMoveText' | translate"
            [attr.aria-label]="'readerMoveText' | translate"></button>
          <textarea
            class="reader-inline-text-input"
            [(ngModel)]="activeTextInput!.value"
            (keydown.enter)="commitTextInputFromKey($event)"
            (keydown.escape)="cancelTextInput()"
            (blur)="commitTextInput($event)"
            [attr.placeholder]="'textOptional' | translate"></textarea>
        </div>

        <div
          *ngFor="let text of getPageTexts(sidePage)"
          class="temporary-text"
          [class.selected]="isTextSelected(sidePage, text)"
          [class.delete-target]="deleteMode"
          [attr.data-page-id]="sidePage.id"
          [attr.data-text-id]="text.id"
          [style.left.%]="text.x * 100"
          [style.top.%]="text.y * 100"
          [style.width.%]="(text.width || 0.22) * 100"
          [style.height.%]="(text.height || 0.055) * 100"
          [style.color]="text.color || '#111827'"
          [style.--text-scale]="text.height || 0.055"
          (click)="selectTextAnnotation(sidePage, text, $event)"
          (pointerdown)="startSavedTextDrag(sidePage, text, $event)">
          <img *ngIf="text.imageDataUrl" [src]="text.imageDataUrl" alt="">
          <span *ngIf="!text.imageDataUrl">{{ text.text }}</span>
        </div>

        <svg
          *ngFor="let stroke of getPageStrokes(sidePage)"
          class="stroke-delete-target"
          [style.display]="deleteMode ? 'block' : 'none'"
          viewBox="0 0 1 1"
          preserveAspectRatio="none"
          (click)="deleteStrokeAnnotation(sidePage, stroke, $event)"
          [attr.title]="'readerDeleteDrawing' | translate"
          [attr.aria-label]="'readerDeleteDrawing' | translate">
          <polyline
            [attr.points]="getStrokePolylinePoints(stroke)"
            fill="none"
            vector-effect="non-scaling-stroke"></polyline>
        </svg>

        <svg class="match-line-layer" viewBox="0 0 1 1" preserveAspectRatio="none" aria-hidden="true">
          <line
            *ngFor="let line of getMatchLines(sidePage); trackBy: trackByMatchLine"
            [class.correct]="line.result === 'correct'"
            [class.incorrect]="line.result === 'incorrect'"
            [attr.x1]="getMatchEndpointCenterX(line.source)"
            [attr.y1]="getMatchEndpointCenterY(line.source)"
            [attr.x2]="getMatchEndpointCenterX(line.target)"
            [attr.y2]="getMatchEndpointCenterY(line.target)"
            vector-effect="non-scaling-stroke">
          </line>
        </svg>

          <div
            *ngFor="let element of sidePage.elements; trackBy: trackByElementId"
            class="reader-element companion-element"
            [class.focus-element]="element.type === 'focus'"
            [class.focus-visible]="focusMode && element.type === 'focus'"
            [class.dot-element]="element.type === 'guideDot'"
            [class.dot-disabled]="element.type === 'guideDot' && !isGuideDotEnabled(element, sidePage)"
            [class.dot-paused]="element.id === pausedGuideElementId"
            [class.speaking-ai-element]="element.type === 'speakingAi'"
            [class.speaking-ai-disabled]="element.type === 'speakingAi' && !isSpeakingAiEnabled(element, sidePage)"
            [class.speaking-ai-active]="element.type === 'speakingAi' && activeSpeakingElement?.id === element.id"
            [class.note-element]="element.type === 'note'"
            [class.answer-key-element]="element.type === 'answerKey'"
            [class.ink-element]="element.type === 'ink'"
            [class.highlighter-element]="element.type === 'highlighter'"
            [class.text-mark-element]="element.type === 'text'"
            [class.game-element]="element.type === 'game'"
            [class.text-task-element]="element.type === 'textTask'"
            [class.choice-task-element]="element.type === 'choiceTask'"
            [class.circle-task-element]="element.type === 'circleTask'"
            [class.circle-selected]="element.type === 'circleTask' && isCircleTaskSelected(element)"
            [class.match-task-element]="element.type === 'matchTask'"
            [class.match-side-a]="element.type === 'matchTask' && element.data['side'] === 'A'"
            [class.match-side-b]="element.type === 'matchTask' && element.data['side'] === 'B'"
            [class.match-selected]="element.type === 'matchTask' && isMatchEndpointSelected(element, sidePage)"
            [class.match-available]="element.type === 'matchTask' && isMatchEndpointAvailable(element, sidePage)"
            [class.match-connected]="element.type === 'matchTask' && isMatchEndpointConnected(element, sidePage)"
            [class.match-missing]="element.type === 'matchTask' && isMatchEndpointMissing(element, sidePage)"
            [class.task-active]="(element.type === 'textTask' || element.type === 'choiceTask') && activeTaskElement?.id === element.id"
            [class.task-correct]="(element.type === 'textTask' || element.type === 'choiceTask' || element.type === 'circleTask') && getTaskResult(element) === 'correct'"
            [class.task-incorrect]="(element.type === 'textTask' || element.type === 'choiceTask' || element.type === 'circleTask') && getTaskResult(element) === 'incorrect'"
            [class.hidden-focus]="element.type === 'focus' && !focusMode"
            [style.left.%]="element.x * 100"
            [style.top.%]="element.y * 100"
            [style.width.%]="(element.width || 0.08) * 100"
            [style.height.%]="(element.height || 0.08) * 100"
            (click)="activateElement(element, $event, sidePage)">
            <img *ngIf="element.type === 'image'" [src]="getElementAssetUrl(element)" [alt]="getElementText(element)">
            <img *ngIf="element.type === 'video'" class="book-marker-icon" src="assets/images/book/video.png" [alt]="'bookMarkerVideo' | translate">
            <span *ngIf="element.type === 'focus'" class="focus-label"></span>
            <img *ngIf="element.type === 'game'" class="book-marker-icon" src="assets/images/book/game.png" [alt]="'bookMarkerGame' | translate">
            <img *ngIf="element.type === 'guideDot'" class="book-marker-icon teacher-marker-icon" src="assets/images/book/teacher.png" [alt]="'bookMarkerTeacherGuide' | translate">
            <span *ngIf="element.type === 'speakingAi'" class="speaking-ai-marker">
              <img class="book-marker-icon" src="assets/images/book/speaking.png" alt="AI speaking">
            </span>
            <span *ngIf="element.type === 'note'" class="note-marker">
              <img class="book-marker-icon" src="assets/images/book/note.png" [alt]="'bookMarkerNote' | translate">
            </span>
            <svg *ngIf="element.type === 'ink' && element.data['points']; else companionInkFallback" class="teacher-stroke-svg" viewBox="0 0 1 1" preserveAspectRatio="none" aria-hidden="true">
              <polyline [attr.points]="getElementPolylinePoints(element)" fill="none" [attr.stroke]="element.data['color'] || '#2563eb'" [attr.stroke-width]="element.data['strokePx'] || 6" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></polyline>
            </svg>
            <ng-template #companionInkFallback>
              <span *ngIf="element.type === 'ink'" class="ink-mark" [style.background]="element.data['color'] || '#2563eb'"></span>
            </ng-template>
            <svg *ngIf="element.type === 'highlighter' && element.data['points']; else companionHighlighterFallback" class="teacher-stroke-svg highlighter-stroke-svg" viewBox="0 0 1 1" preserveAspectRatio="none" aria-hidden="true">
              <polyline [attr.points]="getElementPolylinePoints(element)" fill="none" [attr.stroke]="element.data['color'] || '#fde047'" [attr.stroke-width]="element.data['strokePx'] || 18" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></polyline>
            </svg>
            <ng-template #companionHighlighterFallback>
              <span *ngIf="element.type === 'highlighter'" class="highlighter-mark" [style.background]="element.data['color'] || '#fde047'"></span>
            </ng-template>
            <span *ngIf="element.type === 'text'" class="teacher-text-mark" [style.color]="element.data['color'] || '#111827'">
              <img *ngIf="element.data['imageDataUrl']" [src]="element.data['imageDataUrl']" alt="">
              <span *ngIf="!element.data['imageDataUrl']">{{ element.data['text'] || 'Text' }}</span>
            </span>
            <img *ngIf="element.type === 'answerKey'" class="book-marker-icon" src="assets/images/book/answer key.png" alt="Answer key">
            <input
              *ngIf="element.type === 'textTask' && !shouldUseTaskDock(element)"
              type="text"
              class="text-task-input"
              [ngModel]="getTaskResponseValue(element)"
              (focus)="activateTextTask(element, sidePage, $event)"
              (click)="$event.stopPropagation()"
              (ngModelChange)="updateTaskResponse(element, sidePage, $event)"
              aria-label="Student answer">
            <button
              *ngIf="element.type === 'textTask' && shouldUseTaskDock(element)"
              type="button"
              class="text-task-tap"
              (click)="activateTextTask(element, sidePage, $event)"
              aria-label="Enter student answer">
              <span>{{ getTaskResponseValue(element) }}</span>
            </button>
            <button
              *ngIf="element.type === 'choiceTask'"
              type="button"
              class="choice-task-tap"
              (click)="activateChoiceTask(element, sidePage, $event)"
              aria-label="Choose a word-bank answer">
              <span>{{ getChoiceTaskDisplayValue(element, sidePage) }}</span>
            </button>
            <button
              *ngIf="element.type === 'circleTask'"
              type="button"
              class="circle-task-tap"
              [attr.aria-pressed]="isCircleTaskSelected(element)"
              (click)="toggleCircleTask(element, sidePage, $event)"
              aria-label="Select circling answer">
            </button>
            <button
              *ngIf="element.type === 'matchTask'"
              type="button"
              class="match-task-tap"
              [attr.aria-pressed]="isMatchEndpointSelected(element, sidePage)"
              [attr.aria-disabled]="!isMatchEndpointAvailable(element, sidePage)"
              (click)="activateMatchEndpoint(element, sidePage, $event)"
              aria-label="Select matching endpoint">
              <span></span>
            </button>
          </div>
        </div>
      </div>
    </div>

      <button
        *ngIf="!expandedFocusElement"
        type="button"
        class="reader-page-edge next"
        (click)="$event.stopPropagation(); nextPage()"
        [disabled]="currentPageIndex >= visiblePages.length - 1"
        [title]="'nextPage' | translate"
        [attr.aria-label]="'nextPage' | translate">
        <img class="turn-icon turn-icon-next" src="assets/images/book/show.png" alt="">
      </button>
    </div>
  </main>

  <div
    class="guide-pin-media-overlay"
    [class.visible]="guideOverlayVisible"
    *ngIf="guideOverlayImageUrl">
    <div #guidePinMediaFrame class="guide-pin-media-frame">
      <img [src]="guideOverlayImageUrl" alt="">
    </div>
  </div>

  <img
    class="owl-guide"
    [class.teaching]="owlTeaching"
    [src]="owlImage"
    [style.left.px]="owlX"
    [style.top.px]="owlY"
    [attr.alt]="'readerTeacherOwl' | translate">

  <div class="reader-popover-backdrop" [class.video-fullscreen]="videoFullscreen" *ngIf="expandedElement" (click)="closeExpandedElement()">
    <div class="reader-popover" [class.video-fullscreen]="videoFullscreen" (click)="$event.stopPropagation()">
      <button type="button" class="popover-close" (click)="closeExpandedElement()" [attr.aria-label]="'close' | translate">X</button>
      <div
        #expandedVideoFrame
        class="expanded-video-frame"
        [class.video-fullscreen]="videoFullscreen"
        (click)="$event.stopPropagation()"
        (pointerdown)="$event.stopPropagation()"
        (pointerup)="onExpandedVideoPointerUp($event)"
        *ngIf="expandedElement.type === 'video' && !isYouTubeVideo(expandedElement)">
        <video
          #expandedVideo
          [src]="getElementMediaUrl(expandedElement)"
          controls
          controlsList="nodownload"
          autoplay
          (fullscreenchange)="onExpandedNativeVideoFullscreenChange()"
          (webkitfullscreenchange)="onExpandedNativeVideoFullscreenChange()"
          (webkitbeginfullscreen)="onExpandedNativeVideoFullscreenChange()"
          (webkitendfullscreen)="onExpandedNativeVideoFullscreenChange()">
        </video>
      </div>
      <div class="video-seek-controls" *ngIf="expandedElement.type === 'video' && !isYouTubeVideo(expandedElement)">
        <button type="button" (click)="skipExpandedVideo(-1)">-1s</button>
        <button
          type="button"
          class="video-seek-fullscreen"
          (pointerdown)="onExpandedVideoFullscreenHotspotPointerDown($event)"
          (pointerup)="onExpandedVideoFullscreenHotspotPointerUp($event)"
          (click)="onExpandedVideoFullscreenHotspotClick($event)"
          aria-label="Fullscreen"
          title="Fullscreen">
          <img src="assets/images/maximize.png" alt="">
        </button>
        <button type="button" (click)="skipExpandedVideo(1)">+1s</button>
      </div>
      <div
        #expandedVideoFrame
        class="expanded-video-frame youtube-video-frame"
        [class.video-fullscreen]="videoFullscreen"
        *ngIf="expandedElement.type === 'video' && isYouTubeVideo(expandedElement)">
        <iframe
          [src]="getYouTubeEmbedUrl(expandedElement)"
          [attr.title]="'readerYoutubeVideo' | translate"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; fullscreen; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
          webkitallowfullscreen
          mozallowfullscreen>
        </iframe>
      </div>
      <div class="youtube-fallback" *ngIf="expandedElement.type === 'video' && isYouTubeVideo(expandedElement)">
        <button type="button" (click)="openVideoExternally(expandedElement)">
          {{ 'readerWatchYoutube' | translate }}
        </button>
      </div>
      <div class="expanded-note" *ngIf="expandedElement.type === 'note'">
        {{ getElementText(expandedElement) }}
      </div>
      <div class="expanded-answer-key" *ngIf="expandedElement.type === 'answerKey'">
        <img *ngIf="expandedElement.data['src']; else answerKeyUnavailable" [src]="getElementAssetUrl(expandedElement)" alt="Answer key">
        <ng-template #answerKeyUnavailable>
          <div class="answer-key-unavailable">Answer image unavailable.</div>
        </ng-template>
      </div>
    </div>
  </div>

  <div class="reader-popover-backdrop legacy-focus-popover" *ngIf="false">
    <div class="focus-zoom-modal" (click)="$event.stopPropagation()">
      <button type="button" class="popover-close" (click)="closeExpandedFocus()" [attr.aria-label]="'close' | translate">X</button>
      <div class="focus-zoom-frame" [style.aspect-ratio]="pageAspectRatio">
        <div class="focus-zoom-content" [style.transform]="getFocusZoomTransform(expandedFocusElement)">
          <app-pdf-page-canvas
            *ngIf="expandedFocusPage?.type === 'pdf' && getPagePdfUrl(expandedFocusPage!)"
            [sourceUrl]="getPagePdfUrl(expandedFocusPage!)"
            [pageNumber]="expandedFocusPage?.pdfPage || 1"
            [rotation]="getPageRotation(expandedFocusPage)"
            [renderScale]="2">
          </app-pdf-page-canvas>
          <div *ngIf="expandedFocusPage?.type === 'blank'" class="blank-page"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<app-book-reader-guide-audio-controls [reader]="readerContext"></app-book-reader-guide-audio-controls>
<app-book-reader-speaking-panel [reader]="readerContext"></app-book-reader-speaking-panel>
