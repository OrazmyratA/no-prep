<div class="book-creator-page">
  <app-book-creator-toolbar [creator]="this"></app-book-creator-toolbar>

  <div class="operation-panel" *ngIf="progress$ | async as progress">
    <div class="operation-row">
      <strong>{{ progress.phase }}</strong>
      <span *ngIf="progress.totalBytes > 0; else waitingForBookOperation">
        {{ formatBytes(progress.transferredBytes) }} / {{ formatBytes(progress.totalBytes) }}
      </span>
      <ng-template #waitingForBookOperation>
        <span>{{ 'pleaseWait' | translate }}</span>
      </ng-template>
    </div>
    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progress.totalBytes ? (progress.transferredBytes / progress.totalBytes) * 100 : 0"></div>
    </div>
  </div>

  <div *ngIf="book" class="creator-workspace" [class.page-strip-collapsed]="pageStripCollapsed" [class.inspector-collapsed]="inspectorCollapsed">
    <div
      class="mobile-panel-backdrop"
      *ngIf="pageStripOpen || inspectorOpen"
      (click)="closeMobilePanels()">
    </div>
    <app-book-creator-page-strip [creator]="this"></app-book-creator-page-strip>

    <app-book-creator-editor-surface [creator]="this"></app-book-creator-editor-surface>

    <app-book-creator-inspector [creator]="this"></app-book-creator-inspector>
  </div>
</div>
