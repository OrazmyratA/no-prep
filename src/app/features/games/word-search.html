<div class="min-h-screen bg-gradient-to-br from-indigo-900 to-purple-800 p-4">
  <div class="container mx-auto">
    <h2 class="text-4xl font-bold text-white mb-4 text-center">Word Search</h2>

    <div *ngIf="loading" class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white"></div>
    </div>

    <div *ngIf="!loading && !gameFinished" class="flex flex-col lg:flex-row gap-6 lg:gap-8 items-start">
      <div class="w-full lg:w-1/3 bg-white bg-opacity-10 rounded-xl p-4">
        <h3 class="text-white text-xl mb-4">Words to find</h3>
        <p class="text-white/80 text-sm mb-4">Click the first letter of a word directly in the grid.</p>

        <div class="space-y-2 max-h-[60vh] overflow-y-auto pr-1">
          <button
            *ngFor="let word of words; let i = index"
            type="button"
            (click)="onWordClick(i)"
            class="word-item w-full text-left px-3 py-2 rounded-lg transition"
            [class.word-item-selected]="selectedWordIndex === i && !word.found"
            [class.word-item-found]="word.found">
            <span [class.line-through]="word.found">{{ word.text }}</span>
          </button>
        </div>
      </div>

      <div class="w-full lg:w-2/3 flex justify-center">
        <div class="grid-wrap inline-block bg-white bg-opacity-10 p-3 sm:p-4 rounded-xl">
          <div *ngFor="let row of grid; let r = index" class="flex">
            <button
              *ngFor="let cell of row; let c = index"
              type="button"
              (click)="onGridClick(r, c)"
              class="grid-cell"
              [class.grid-cell-selected]="isCellSelected(r, c) && !cell.isFound"
              [class.grid-cell-found]="cell.isFound">
              {{ cell.letter }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Game Finished Overlay -->
    <div *ngIf="gameFinished" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-xl p-8 text-center">
        <p class="text-2xl mb-4">All words found!</p>
        <div class="space-x-4">
          <button (click)="onMenuAction('activity')" class="bg-purple-500 text-white px-6 py-2 rounded-full">Activities</button>
          <button (click)="resetGame()" class="bg-blue-500 text-white px-6 py-2 rounded-full">Play Again</button>
        </div>
      </div>
    </div>

    <app-sandwich-menu (action)="onMenuAction($event)"></app-sandwich-menu>
  </div>
</div>
