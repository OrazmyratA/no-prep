<div class="word-search-shell h-screen overflow-hidden bg-gradient-to-br from-indigo-900 to-purple-800">
  <div class="word-search-frame">
    <header class="word-search-header">
      <h2>{{ 'wordSearchTitle' | translate }}</h2>
      <div class="word-search-progress" aria-live="polite">
        <span>{{ foundWordsCount }}/{{ words.length }}</span>
        <div class="progress-track">
          <div class="progress-fill" [style.width.%]="foundProgressPercent"></div>
        </div>
      </div>
    </header>

    <div *ngIf="loading" class="word-search-loading">
      <div class="loading-spinner"></div>
    </div>

    <main *ngIf="!loading && !gameFinished" class="word-search-layout">
      <section class="word-list-panel">
        <div class="word-list-heading">
          <h3 class="word-list-title">{{ 'wordSearchWordsToFind' | translate }}</h3>
          <span>{{ words.length }}</span>
        </div>

        <div class="word-list-scroll">
          <button
            *ngFor="let word of words; let i = index"
            type="button"
            (click)="onWordClick(i)"
            class="word-item"
            [class.word-item-selected]="selectedWordIndex === i && !word.found"
            [class.word-item-found]="word.found"
            [style.--word-found-color]="word.found ? word.color : null">
            <span [class.line-through]="word.found">{{ word.text }}</span>
          </button>
        </div>
      </section>

      <section class="word-grid-panel">
        <div class="grid-wrap">
          <div *ngFor="let row of grid; let r = index" class="grid-row">
            <button
              *ngFor="let cell of row; let c = index"
              type="button"
              (click)="onGridClick(r, c)"
              class="grid-cell"
              [class.grid-cell-selected]="isCellSelected(r, c) && !cell.isFound"
              [class.grid-cell-found]="cell.isFound"
              [style.--cell-found-color]="cell.isFound ? getCellColor(r, c) : null">
              {{ cell.letter }}
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- Game Finished Overlay -->
    <div *ngIf="gameFinished" class="finish-overlay">
      <div class="finish-card">
        <p>{{ 'wordSearchAllWordsFound' | translate }}</p>
        <div class="finish-actions">
          <button type="button" class="finish-secondary" (click)="onMenuAction('activity')">{{ 'activitiesLabel' | translate }}</button>
          <button type="button" class="finish-primary" (click)="resetGame()">{{ 'playAgain' | translate }}</button>
        </div>
      </div>
    </div>

    <app-sandwich-menu (action)="onMenuAction($event)"></app-sandwich-menu>
  </div>
</div>
