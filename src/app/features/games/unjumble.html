<div class="relative h-screen overflow-hidden bg-gradient-to-br from-green-900 to-teal-800 p-3 flex flex-col">
  <div class="w-full flex-1 min-h-0 flex flex-col">
    <h2 class="text-2xl font-bold text-white mb-1 text-center">{{ 'unjumbleTitle' | translate }}</h2>
    <div *ngIf="!loading && !gameFinished && currentItem"
         class="absolute top-3 left-3 text-white text-sm font-bold bg-black bg-opacity-35 rounded-full px-3 py-1 shadow-lg">
      {{ currentIndex + 1 }} / {{ items.length }}
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white"></div>
    </div>

    <div *ngIf="!loading && !gameFinished && currentItem"
         class="flex-1 min-h-0 flex flex-col justify-evenly pt-2"
         [class.long-sentence]="originalWords.length > 15">

      <div class="media-stage">
        <div class="media-card" [class.flipped]="isMediaFlipped" (click)="toggleMediaFlip()">
          <span class="media-face media-front">
            <span class="card-back-pattern"></span>
            <button
              *ngIf="hasCurrentAudio"
              type="button"
              class="speaker-btn"
              (click)="$event.stopPropagation(); playCurrentItemAudio()"
              aria-label="Play item audio"
            >
              🔊
            </button>
          </span>
          <span class="media-face media-back">
            <img *ngIf="currentImageUrl; else noUnjumbleImage" [src]="currentImageUrl" alt="">
            <ng-template #noUnjumbleImage>
              <span class="image-empty"></span>
            </ng-template>
          </span>
        </div>
      </div>

      <!-- Target area (arranged sentence) -->
      <div cdkDropList
           #targetList="cdkDropList"
           [cdkDropListData]="targetWords"
           cdkDropListOrientation="mixed"
           [cdkDropListConnectedTo]="[sourceList]"
           (cdkDropListDropped)="drop($event)"
           class="unjumble-target-zone">
        <div *ngFor="let word of targetWords; let i = index; trackBy: trackByWordId"
             cdkDrag
             class="word-tile word-tile-target px-4 py-2 bg-green-500 text-white rounded-lg shadow-lg cursor-move text-lg">
          {{ word.word }}
        </div>
      </div>

      <!-- Source area (available words) -->
      <div cdkDropList
           #sourceList="cdkDropList"
           [cdkDropListData]="sourceWords"
           cdkDropListOrientation="mixed"
           [cdkDropListConnectedTo]="[targetList]"
           (cdkDropListDropped)="drop($event)"
           class="unjumble-source-zone">
        <div *ngFor="let word of sourceWords; let i = index; trackBy: trackByWordId"
             cdkDrag
             (click)="selectWordByClick(word, i)"
             [class.animate-fade]="getAnimationType(word.id) === 'fade'"
             [class.animate-shake]="getAnimationType(word.id) === 'shake'"
             class="word-tile word-tile-source px-4 py-2 bg-yellow-500 text-white rounded-lg shadow-lg cursor-pointer hover:bg-yellow-400 transition text-lg">
          {{ word.word }}
        </div>
      </div>

      <!-- Control buttons -->
      <div class="flex justify-center gap-4 mt-2">
        <button (click)="previousItem()"
                [disabled]="currentIndex === 0"
                aria-label="Previous"
                title="Previous"
                class="w-12 h-12 bg-slate-500 hover:bg-slate-700 text-white font-bold rounded-full shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center text-xl">
          <span aria-hidden="true">&#9664;</span>
        </button>
        <button (click)="shuffle()"
                class="bg-purple-500 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded-full shadow-lg transition">
          {{ 'shuffle' | translate }}
        </button>
        <button (click)="nextItem()"
                aria-label="Next"
                title="Next"
                class="w-12 h-12 bg-blue-500 hover:bg-blue-700 text-white font-bold rounded-full shadow-lg transition flex items-center justify-center text-xl">
          <span aria-hidden="true">&#9654;</span>
        </button>
      </div>
    </div>

    <!-- Game Finished Overlay -->
    <div *ngIf="gameFinished" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-xl p-8 text-center">
        <p class="text-2xl mb-4">{{ 'unjumbleAllSentencesSolved' | translate }}</p>
        <div class="space-x-4">
          <button (click)="onMenuAction('activity')" class="bg-purple-500 text-white px-6 py-2 rounded-full">{{ 'activitiesLabel' | translate }}</button>
          <button (click)="resetGame()" class="bg-blue-500 text-white px-6 py-2 rounded-full">{{ 'playAgain' | translate }}</button>
        </div>
      </div>
    </div>

    <!-- Sandwich Menu -->
    <app-sandwich-menu (action)="onMenuAction($event)"></app-sandwich-menu>
  </div>
</div>
