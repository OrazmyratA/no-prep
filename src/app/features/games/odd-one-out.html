<div class="game-container">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="ambient ambient-three"></div>

  <div *ngIf="loading" class="loading-overlay">
    <div class="loading-spinner">🔍</div>
    <p>{{ 'oddOneOutLoading' | translate }}</p>
  </div>

  <app-game-keyboard-help
    *ngIf="!loading && gameActive"
    class="odd-keyboard-help"
    [shortcuts]="keyboardShortcuts"
    (openChange)="keyboardHintsVisible = $event"
    title="Keyboard shortcuts">
  </app-game-keyboard-help>

  <div *ngIf="!loading && gameActive" class="game-board">
    <header class="game-header">
      <div class="score-card">
        <p class="label">{{ 'score' | translate }}</p>
        <strong>{{ score }} / {{ totalRounds }}</strong>
      </div>
      <div class="timer-card" [class.urgent]="timerRemaining <= 5">
        <p class="label">{{ 'oddOneOutTimeLeft' | translate }}</p>
        <strong>⏱ {{ timerRemaining }}s</strong>
      </div>
    </header>

    <section class="playground">
      <article class="rectangle left">
        <div class="items-area">
          <div *ngFor="let ri of leftSet; trackBy: trackByRoundItem"
               class="item-card"
               [attr.data-item-id]="ri.item.id"
               [style.top]="ri.position.top"
               [style.left]="ri.position.left"
               [class.keyboard-selected]="isKeyboardItemSelected(ri, 'left')"
               [class.fading-out]="isRevealingOdd && ri.item.id !== currentOddItem?.id"
               [class.odd-winner]="isRevealingOdd && ri.item.id === currentOddItem?.id"
               (click)="onItemClick(ri.item, 'left')">
            <span *ngIf="keyboardHintsVisible && itemKeyboardNumber(ri, 'left') !== null" class="item-keyboard-number">{{ itemKeyboardNumber(ri, 'left') }}</span>
            <div *ngIf="ri.item.image" class="item-image">
              <img [src]="imageUrl(ri.item.image, ri.item.id!)" alt="item">
            </div>
            <div *ngIf="ri.item.text && showItemNames" class="item-text">{{ ri.item.text }}</div>
          </div>
        </div>
      </article>

      <article class="rectangle right">
        <div class="items-area">
          <div *ngFor="let ri of rightSet; trackBy: trackByRoundItem"
               class="item-card"
               [attr.data-item-id]="ri.item.id"
               [style.top]="ri.position.top"
               [style.left]="ri.position.left"
               [class.keyboard-selected]="isKeyboardItemSelected(ri, 'right')"
               [class.fading-out]="isRevealingOdd && ri.item.id !== currentOddItem?.id"
               [class.odd-winner]="isRevealingOdd && ri.item.id === currentOddItem?.id"
               (click)="onItemClick(ri.item, 'right')">
            <span *ngIf="keyboardHintsVisible && itemKeyboardNumber(ri, 'right') !== null" class="item-keyboard-number">{{ itemKeyboardNumber(ri, 'right') }}</span>
            <div *ngIf="ri.item.image" class="item-image">
              <img [src]="imageUrl(ri.item.image, ri.item.id!)" alt="item">
            </div>
            <div *ngIf="ri.item.text && showItemNames" class="item-text">{{ ri.item.text }}</div>
          </div>
        </div>
      </article>
    </section>
  </div>

  <app-game-finish-overlay
    *ngIf="gameFinished"
    [title]="'oddOneOutVictory' | translate"
    [message]="('oddOneOutFinalScore' | translate) + ' ' + score + ' / ' + totalRounds"
    (playAgain)="resetGame()"
    (activities)="goToActivities()">
  </app-game-finish-overlay>

  <app-sandwich-menu (action)="onMenuAction($event)" (menuOpenChange)="onMenuOpenChange($event)"></app-sandwich-menu>
</div>
