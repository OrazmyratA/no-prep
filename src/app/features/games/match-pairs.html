<div #gameShell class="h-screen overflow-hidden bg-gradient-to-br from-purple-900 to-indigo-800 p-4 flex flex-col game-container">
  <app-game-keyboard-help
    class="match-keyboard-help"
    [shortcuts]="keyboardShortcuts"
    (openChange)="keyboardHintsVisible = $event"
    title="Keyboard shortcuts">
  </app-game-keyboard-help>

  <div class="w-full mx-auto flex flex-col flex-1 min-h-0">
    <div class="match-header flex items-center justify-center">
      <button (click)="peek()"
              [disabled]="isPeeking"
              class="mr-4 text-white hover:text-gray-300 transition disabled:opacity-50"
              [attr.title]="'matchPairsPeek' | translate">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
        </svg>
      </button>
      <h2 class="text-4xl font-bold text-white">{{ 'matchPairsTitle' | translate }}</h2>
    </div>

    <!-- Loading -->
    <div *ngIf="!cards.length" class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white"></div>
    </div>

    <!-- Dynamic Game Grid -->
    <div *ngIf="cards.length > 0" 
         class="game-board-container">
      <div #gridContainer class="game-grid"
           [style.gap.px]="gap"
           [style.height.px]="boardHeight">
        <div *ngFor="let row of cardRows; let rowIndex = index; trackBy: trackByRowIndex"
             class="game-row"
             [style.gap.px]="gap">
          <div *ngFor="let card of row; let colIndex = index; trackBy: trackByCardId"
               (click)="onCardClick(rowIndex * gridColumns + colIndex)"
               class="card"
               [class.matched]="card.matched"
               [class.keyboard-selected]="isKeyboardSelected(rowIndex * gridColumns + colIndex)"
               role="button"
               [attr.aria-label]="'Card ' + (rowIndex * gridColumns + colIndex + 1)"
               [attr.aria-disabled]="card.flipped || card.matched || isPeeking || gameFinished"
                [class.shake]="card.shake"
                [style.width.px]="cardSize"
                [style.height.px]="cardSize">
            <span *ngIf="keyboardHintsVisible && !card.matched" class="game-keyboard-hint-badge">{{ rowIndex * gridColumns + colIndex + 1 }}</span>
            <div class="card-inner" [class.flipped]="card.flipped">
              <!-- Front (hidden) -->
              <div class="card-front">
                {{ rowIndex * gridColumns + colIndex + 1 }}
              </div>
              <!-- Back (revealed) -->
              <div class="card-back">
                <ng-container *ngIf="card.imageSrc; else textOnlyBack">
                  <div class="flex items-center justify-center h-3/5">
                    <img [src]="card.imageSrc" class="max-h-full max-w-full object-contain">
                  </div>
                  <p *ngIf="card.item.text" class="text-center mt-2 px-1" [style.fontSize.px]="cardTextSize">{{ card.item.text }}</p>
                </ng-container>
                <ng-template #textOnlyBack>
                  <div class="flex items-center justify-center h-full px-2">
                    <p class="text-center font-semibold leading-tight" [style.fontSize.px]="cardTextSize + 4">{{ card.item.text }}</p>
                  </div>
                </ng-template>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Game Info -->
    <div class="match-info mt-4 text-white text-center">
      <p>{{ 'matchPairsRemaining' | translate }}: {{ remainingPairs }} / {{ items.length }} {{ 'matchPairsPairs' | translate }}</p>
    </div>

    <!-- Reset Button -->
    <div class="match-actions mt-4 flex justify-center">
      <button (click)="resetGame()"
              class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full shadow-lg transition">
        {{ 'matchPairsShuffleRestart' | translate }}
      </button>
    </div>

    <app-game-finish-overlay
      *ngIf="gameFinished"
      [title]="'matchPairsYouGotThemAll' | translate"
      (playAgain)="resetGame()"
      (activities)="onMenuAction('activity')">
    </app-game-finish-overlay>

    <!-- Sandwich Menu -->
    <app-sandwich-menu (action)="onMenuAction($event)"></app-sandwich-menu>
  </div>
</div>
