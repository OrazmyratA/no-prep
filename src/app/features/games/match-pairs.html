<div class="min-h-screen bg-gradient-to-br from-purple-900 to-indigo-800 p-4">
  <div class="container mx-auto">
    <h2 class="text-4xl font-bold text-white mb-4 text-center">Match the Pairs</h2>

    <!-- Loading / Empty State -->
    <div *ngIf="!cards.length" class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white"></div>
    </div>

    <!-- Game Grid -->
    <div *ngIf="cards.length > 0" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
      <div *ngFor="let card of cards; let i = index"
          (click)="onCardClick(i)"
          class="aspect-square relative perspective-1000">
        <div class="card w-full h-full preserve-3d"
            [class.flipped]="card.flipped"
            [class.matched]="card.matched"
            [class.shake]="card.shake">
          <!-- Front (hidden) -->
          <div class="card-front">
            {{ i + 1 }}
          </div>
          <!-- Back (revealed) -->
          <div class="card-back">
            <div *ngIf="card.imageSrc" class="w-full h-3/4 flex items-center justify-center">
              <img [src]="card.imageSrc" class="max-h-full max-w-full object-contain">
            </div>
            <p *ngIf="card.item.text" class="text-center">{{ card.item.text }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Game Info -->
    <div class="mt-4 text-white text-center">
      <p>Matched: {{ matchedCount / 2 }} / {{ items.length }} pairs</p>
    </div>

    <!-- Reset Button -->
    <div class="mt-4 flex justify-center">
      <button (click)="resetGame()"
              class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full shadow-lg transition">
        Shuffle & Restart
      </button>
    </div>

    <!-- Game Finished Overlay -->
    <div *ngIf="gameFinished" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-xl p-8 text-center">
        <p class="text-2xl mb-4">You got them all!</p>
        <div class="space-x-4">
          <button (click)="onMenuAction('activity')" class="bg-purple-500 text-white px-6 py-2 rounded-full">Activities</button>
          <button (click)="resetGame()" class="bg-blue-500 text-white px-6 py-2 rounded-full">Play Again</button>
        </div>
      </div>
    </div>

    <!-- Sandwich Menu -->
    <app-sandwich-menu (action)="onMenuAction($event)"></app-sandwich-menu>
  </div>
</div>
