<div class="game-container">
  <app-game-keyboard-help
    class="team-tug-keyboard-help"
    [shortcuts]="keyboardShortcuts"
    (openChange)="keyboardHintsVisible = $event"
    title="Keyboard shortcuts">
  </app-game-keyboard-help>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-overlay">
    <div class="loading-spinner">⚙</div>
    <p>{{ 'teamTugLoading' | translate }}</p>
  </div>

  <!-- Game board -->
  <div *ngIf="!loading && gameActive && leftChoice.primary && rightChoice.primary" class="game-board">
    <div class="status-bar">
      <div class="score-pill left-pill" [class.highlight]="leftTeam.isAboutToWin">
        <strong>{{ leftTeam.score }}</strong>
      </div>
      <div *ngIf="enableTimer && timerRemaining !== null" class="timer-pill" aria-live="polite">
        <span class="timer-label">{{ 'teamTugTimer' | translate }}</span>
        <strong>{{ timerDisplay }}</strong>
      </div>
      <div class="score-pill right-pill" [class.highlight]="rightTeam.isAboutToWin">
        <strong>{{ rightTeam.score }}</strong>
      </div>
    </div>

    <section class="video-stage">
      <div class="stage-secret-glow"></div>
      <div class="center-line"></div>
      <video
        autoplay
        loop
        muted
        playsinline
        class="character-video"
        [style.left]="characterPosition + '%'"
        [style.width]="characterWidth + '%'"
      >
        <source src="assets/videos/playing.mp4" type="video/mp4" />
      </video>
    </section>

    <section class="game-details">
      <div class="teams-row">
        <article class="team left-team">
          <div class="team-item" *ngIf="leftChoice.primary as leftPrimary">
            <img
              *ngIf="leftPrimary.image"
              [src]="imageUrl(leftPrimary.image, leftPrimary.id!)"
              [attr.alt]="leftPrimary.text + ' image'"
              class="item-thumb"
            />
          </div>
          <div *ngIf="leftTeam.isAboutToWin" class="about-to-win">⚡ {{ 'teamTugAboutToWin' | translate }}</div>
          <div class="button-row">
            <button
              type="button"
              class="team-button"
              [class.about-to-win]="leftTeam.isAboutToWin"
              (pointerdown)="onTeamButtonPress($event, 'left', leftButtonOrder ? true : false)"
            >
              <span *ngIf="keyboardHintsVisible" class="game-keyboard-hint-badge">A</span>
              {{ leftFirstButtonLabel }}
            </button>
            <button
              type="button"
              class="team-button"
              [class.about-to-win]="leftTeam.isAboutToWin"
              (pointerdown)="onTeamButtonPress($event, 'left', leftButtonOrder ? false : true)"
            >
              <span *ngIf="keyboardHintsVisible" class="game-keyboard-hint-badge">S</span>
              {{ leftSecondButtonLabel }}
            </button>
          </div>
        </article>
        <article class="team right-team">
          <div class="team-item" *ngIf="rightChoice.primary as rightPrimary">
            <img
              *ngIf="rightPrimary.image"
              [src]="imageUrl(rightPrimary.image, rightPrimary.id!)"
              [attr.alt]="rightPrimary.text + ' image'"
              class="item-thumb"
            />
          </div>
          <div *ngIf="rightTeam.isAboutToWin" class="about-to-win">⚡ {{ 'teamTugAboutToWin' | translate }}</div>
          <div class="button-row">
            <button
              type="button"
              class="team-button"
              [class.about-to-win]="rightTeam.isAboutToWin"
              (pointerdown)="onTeamButtonPress($event, 'right', rightButtonOrder ? true : false)"
            >
              <span *ngIf="keyboardHintsVisible" class="game-keyboard-hint-badge">K</span>
              {{ rightFirstButtonLabel }}
            </button>
            <button
              type="button"
              class="team-button"
              [class.about-to-win]="rightTeam.isAboutToWin"
              (pointerdown)="onTeamButtonPress($event, 'right', rightButtonOrder ? false : true)"
            >
              <span *ngIf="keyboardHintsVisible" class="game-keyboard-hint-badge">L</span>
              {{ rightSecondButtonLabel }}
            </button>
          </div>
        </article>
      </div>
    </section>
  </div>

  <app-game-finish-overlay
    *ngIf="gameStatus === 'leftWin' || gameStatus === 'rightWin' || gameStatus === 'draw'"
    [title]="gameStatus === 'draw' ? ('teamTugDraw' | translate) : ('teamTugWins' | translate)"
    [message]="leftTeam.score + ' / ' + rightTeam.score"
    (playAgain)="resetGame()"
    (activities)="onMenuAction('activity')">
    <div class="winner-scoreboard">
      <div class="score-chip left-chip">
        <strong>{{ leftTeam.score }}</strong>
      </div>
      <div class="score-chip right-chip">
        <strong>{{ rightTeam.score }}</strong>
      </div>
    </div>
  </app-game-finish-overlay>




  <!-- Sandwich Menu -->
  <app-sandwich-menu (action)="onMenuAction($event)"></app-sandwich-menu>
</div>
