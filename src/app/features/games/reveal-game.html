<div class="min-h-screen bg-gradient-to-br from-indigo-900 to-purple-900 p-4 flex flex-col items-center">
  <h2 class="text-4xl font-bold text-white mb-2">Reveal Game</h2>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center justify-center h-64">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white"></div>
  </div>

  <!-- No images -->
  <div *ngIf="!loading && items.length === 0" class="text-white text-center p-8">
    <p class="text-xl">No items with images found.</p>
    <button (click)="onMenuAction('activity')" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">Back to Activities</button>
  </div>

  <!-- Game active -->
  <div *ngIf="!loading && items.length > 0 && gameActive && currentItem" class="flex flex-col items-center">
    <div class="relative inline-block">
      <img [src]="imageUrl(currentItem.image!, currentItem.id!)"
     class="block max-w-full max-h-[70vh] rounded-xl shadow-2xl">
      <!-- Grid overlay - exactly covers the image -->
      <div class="absolute inset-0 grid"
          [style.gridTemplateColumns]="'repeat(' + gridSize + ', 1fr)'"
          [style.gridTemplateRows]="'repeat(' + gridSize + ', 1fr)'">
        <div *ngFor="let row of gridRevealed; let r = index">
          <div *ngFor="let cell of row; let c = index"
              class="w-full h-full bg-black transition-opacity duration-200"
              [class.opacity-0]="gridRevealed[r][c]">
          </div>
        </div>
      </div>
    </div>

    <!-- Timer bar -->
    <div class="w-full max-w-md mt-4">
      <div class="flex justify-between text-white mb-1">
        <span>{{ isPaused ? 'Paused' : 'Revealing...' }}</span>
        <span>{{ timeLeft.toFixed(1) }}s</span>
      </div>
      <div class="w-full bg-gray-700 rounded-full h-2.5">
        <div class="bg-gradient-to-r from-green-400 to-blue-500 h-2.5 rounded-full transition-all duration-100"
             [style.width.%]="(timeLeft / totalTime) * 100"></div>
      </div>
    </div>

    <!-- Skip button -->
    <button (click)="skipToNext()"
            [disabled]="isPaused"
            class="mt-4 bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-6 rounded-full shadow-lg transition">
      Skip to Next
    </button>
  </div>

  <!-- Game Finished Overlay -->
  <div *ngIf="!loading && gameFinished" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-8 text-center">
      <p class="text-2xl mb-4">All images revealed!</p>
      <div class="space-x-4">
        <button (click)="onMenuAction('activity')" class="bg-purple-500 text-white px-6 py-2 rounded-full">Activities</button>
        <button (click)="onMenuAction('startover')" class="bg-blue-500 text-white px-6 py-2 rounded-full">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Sandwich Menu -->
  <app-sandwich-menu (action)="onMenuAction($event)" (menuOpenChange)="onMenuOpenChange($event)"></app-sandwich-menu>
</div>
