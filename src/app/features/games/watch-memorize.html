<div #gameShell class="h-screen overflow-hidden bg-gradient-to-br from-purple-900 to-pink-800 p-4 flex flex-col game-container">
  <div class="w-full px-2 flex flex-col flex-1 min-h-0">
    <h2 class="watch-title text-4xl font-bold text-white mb-4 text-center">{{ 'watchMemorizeTitle' | translate }}</h2>

    <!-- Loading -->
    <div *ngIf="loading" class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white"></div>
    </div>

    <!-- Scrolling Phase -->
    <div *ngIf="!loading && scrollPhase && scrollingItems.length > 0" class="scroll-stage mb-8">
      <div class="scroll-container" [class.paused]="isPaused">
        <div *ngIf="currentScrollItem" class="scrolling-item">
          <ng-container *ngIf="currentScrollItem.image; else scrollTextOnly">
            <div class="scrolling-item-media">
              <img [src]="imageUrl(currentScrollItem.image!, currentScrollItem.id!)">
            </div>
            <p class="font-semibold text-center mt-2">{{ currentScrollItem.text }}</p>
          </ng-container>
          <ng-template #scrollTextOnly>
            <div class="scrolling-item-media scrolling-item-text-only">
              <span class="scroll-text-label">{{ currentScrollItem.text }}</span>
            </div>
          </ng-template>
        </div>
      </div>
    </div>

    <!-- Recall Phase Grid -->
<!-- Recall Phase Grid (dynamic, no scrolling) -->
<div *ngIf="!loading && !scrollPhase && gridItems.length > 0" 
     class="recall-grid-container">
  <div #gridContainer class="recall-grid" 
       [style.gap.px]="gridGap"
       [style.height.px]="recallBoardHeight">
    <div *ngFor="let row of recallRows; let rowIndex = index; trackBy: trackByRowIndex"
         class="recall-row"
         [style.gap.px]="gridGap">
      <div *ngFor="let item of row; let colIndex = index; trackBy: trackByItemId"
           (click)="onGridClick(rowIndex * gridColumns + colIndex)"
           class="grid-item"
           [class.selected]="selectedIndices.has(rowIndex * gridColumns + colIndex)"
           [style.width.px]="cardSize"
           [style.height.px]="cardSize">
        <ng-container *ngIf="item.image; else recallTextOnly">
          <div class="grid-item-media w-full flex-1 flex items-center justify-center min-h-0">
            <img [src]="imageUrl(item.image!, item.id!)" class="w-full h-full object-contain">
          </div>
          <p class="text-center font-medium mt-1" [style.fontSize.px]="gridTextSize">{{ item.text }}</p>
        </ng-container>
        <ng-template #recallTextOnly>
          <div class="w-full h-full flex items-center justify-center px-2">
            <p class="text-center font-semibold leading-tight" [style.fontSize.px]="gridTextSize + 4">{{ item.text }}</p>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>

    <!-- Empty / Info -->
    <div *ngIf="!loading && scrollingItems.length === 0" class="text-white text-center p-8">
      <p class="text-xl">{{ 'watchMemorizeNoItems' | translate }}</p>
    </div>

    <!-- Game Finished Overlay -->
    <div *ngIf="showWinPopup" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-xl p-8 text-center">
        <p class="text-2xl mb-4">{{ 'watchMemorizeYouGotThemAll' | translate }}</p>
        <div class="space-x-4">
          <button (click)="onMenuAction('activity')" class="bg-purple-500 text-white px-6 py-2 rounded-full">{{ 'activitiesLabel' | translate }}</button>
          <button (click)="resetGame()" class="bg-blue-500 text-white px-6 py-2 rounded-full">{{ 'playAgain' | translate }}</button>
        </div>
      </div>
    </div>

    <!-- Sandwich Menu -->
    <app-sandwich-menu
      (action)="onMenuAction($event)"
      (menuOpenChange)="onMenuOpenChange($event)">
    </app-sandwich-menu>
  </div>
</div>
