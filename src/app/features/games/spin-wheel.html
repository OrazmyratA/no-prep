<div class="min-h-screen bg-gradient-to-br from-indigo-900 to-purple-900 pt-0 pb-1 px-1 flex items-start justify-center">
  <div class="text-center -mt-1">
    <h2 class="text-3xl font-bold text-white mb-0.5 drop-shadow-lg">Spin the Wheel</h2>

    <!-- Loading State -->
    <div *ngIf="loading" class="flex justify-center items-center h-40">
      <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-white"></div>
    </div>

    <!-- Wheel Container -->
    <div *ngIf="!loading" class="relative inline-block">
      <canvas #wheelCanvas width="560" height="560" class="rounded-full max-w-full h-auto"></canvas>

      <!-- Spin Button -->
      <button (click)="spin()"
              [disabled]="spinning || currentItems.length === 0"
              class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold py-2 px-5 rounded-full shadow-lg text-xl hover:scale-110 transition border-4 border-white disabled:opacity-50 disabled:cursor-not-allowed">
        {{ spinning ? 'Spinning...' : (currentItems.length === 0 ? 'No Items' : 'SPIN') }}
      </button>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && currentItems.length === 0" class="mt-0.5 bg-white bg-opacity-20 backdrop-blur-lg rounded-xl p-2">
      <p class="text-white text-lg">No items left!</p>
      <button (click)="resetGame()" class="mt-0.5 bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded-full">
        Start Over
      </button>
    </div>

    <!-- Action Buttons -->
    <div class="mt-0.5 flex justify-center space-x-2">
      <button (click)="eliminate()"
              class="bg-red-500 hover:bg-red-700 text-white font-bold py-1 px-3 rounded-full shadow transition text-sm">
        Eliminate
      </button>
      <button (click)="resetGame()"
              class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded-full shadow transition text-sm">
        Reset
      </button>
    </div>

    <!-- Sandwich Menu -->
    <app-sandwich-menu (action)="onMenuAction($event)"></app-sandwich-menu>
  </div>
</div>
