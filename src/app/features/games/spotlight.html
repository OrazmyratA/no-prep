<div class="game-container" #itemContainer>
  <!-- Loading overlay -->
  <div *ngIf="loading" class="loading-overlay">
    <div class="loading-spinner">🔦</div>
    <p>{{ 'spotlightLoading' | translate }}</p>
  </div>

  <!-- Game area -->
  <div *ngIf="!loading && !gameFinished && currentItem" class="spotlight-wrapper">
    <!-- Item display – fills the screen -->
    <div class="item-display">
      <div *ngIf="currentItem.image" class="item-image">
        <img [src]="imageUrl(currentItem.image, currentItem.id!)" alt="item">
      </div>
      <div *ngIf="currentItem.text" class="item-text" [class.large-text]="!currentItem.image">
        {{ currentItem.text }}
      </div>
    </div>

    <!-- Spotlight canvas overlay – hides the default cursor -->
    <canvas #spotlightCanvas
            class="spotlight-canvas"
            (mousemove)="onMouseMove($event)"
            (touchmove)="onTouchMove($event)"
            (touchstart)="onTouchMove($event)"></canvas>

    <div *ngIf="!gameFinished && currentItem"
         class="spotlight-pointer"
         [style.left.px]="pointerLeft"
         [style.top.px]="pointerTop"></div>

    <!-- Navigation buttons -->
    <div class="nav-buttons">
      <button (click)="revealAllScreen()" class="nav-btn reveal" [attr.title]="'spotlightRevealTitle' | translate">👁️</button>
      <button (click)="previousItem()" [disabled]="currentIndex === 0" class="nav-btn prev">{{ 'previous' | translate }}</button>
      <button (click)="randomItem()" [disabled]="items.length < 2" class="nav-btn random">{{ 'random' | translate }}</button>
      <button (click)="nextItem()" [disabled]="currentIndex === items.length - 1" class="nav-btn next">{{ 'next' | translate }}</button>
    </div>

      <!-- Top‑left controls (progress + speaker) -->
    <div class="top-left-controls">
      <div class="progress">
        {{ currentIndex + 1 }} / {{ items.length }}
      </div>
      <button *ngIf="currentItem" 
              (click)="playCurrentItemSound()" 
              class="speaker-btn"
              [class.disabled]="!currentHasAudio"
              [disabled]="!currentHasAudio">
        🔊
      </button>
    </div>
  </div>  

  <!-- Victory popup -->
  <div *ngIf="gameFinished" class="victory-overlay">
    <div class="victory-content">
      <h2 class="victory-title">{{ 'spotlightVictory' | translate }}</h2>
      <div class="popup-actions">
        <button (click)="resetGame()" class="btn btn-primary">{{ 'playAgain' | translate }}</button>
        <button (click)="onMenuAction('activity')" class="btn btn-secondary">{{ 'activitiesLabel' | translate }}</button>
      </div>
    </div>
  </div>

  <!-- Sandwich Menu (shared component) -->
  <app-sandwich-menu (action)="onMenuAction($event)"></app-sandwich-menu>
</div>
