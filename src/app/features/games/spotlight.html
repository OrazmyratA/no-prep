<div class="game-container" #itemContainer>
  <!-- Loading overlay -->
  <div *ngIf="loading" class="loading-overlay">
    <div class="loading-spinner">&#128294;</div>
    <p>{{ 'spotlightLoading' | translate }}</p>
  </div>

  <!-- Game area -->
  <div *ngIf="!loading && currentItem" class="spotlight-wrapper">
    <!-- Item display fills the screen -->
    <div class="item-display">
      <div *ngIf="currentItem.image" class="item-image">
        <img [src]="imageUrl(currentItem.image, currentItem.id!)" alt="item">
      </div>
      <div *ngIf="currentItem.text" class="item-text" [class.large-text]="!currentItem.image">
        {{ currentItem.text }}
      </div>
    </div>

    <!-- Spotlight canvas overlay hides the default cursor -->
    <canvas #spotlightCanvas
            class="spotlight-canvas"
            (mousemove)="onMouseMove($event)"
            (touchmove)="onTouchMove($event)"
            (touchstart)="onTouchMove($event)"></canvas>

    <div *ngIf="currentItem"
         class="spotlight-pointer"
         [style.left.px]="pointerLeft"
         [style.top.px]="pointerTop"></div>

    <!-- Navigation buttons -->
    <div class="nav-buttons">
      <button (click)="revealAllScreen()" class="nav-btn reveal" [attr.title]="'spotlightRevealTitle' | translate">&#128065;</button>
      <button (click)="previousItem()" [disabled]="currentIndex === 0" class="nav-btn prev icon-only" aria-label="Previous" title="Previous">
        <span aria-hidden="true">&#9664;</span>
      </button>
      <button (click)="randomItem()" [disabled]="items.length < 2" class="nav-btn random">{{ 'random' | translate }}</button>
      <button (click)="nextItem()" [disabled]="currentIndex === items.length - 1" class="nav-btn next icon-only" aria-label="Next" title="Next">
        <span aria-hidden="true">&#9654;</span>
      </button>
    </div>

    <!-- Top-left controls: progress, speaker, and keyboard help -->
    <div class="top-left-controls">
      <div class="top-left-control-row">
        <div class="progress">
          {{ currentIndex + 1 }} / {{ items.length }}
        </div>
        <button *ngIf="currentItem"
                (click)="playCurrentItemSound()"
                class="speaker-btn"
                [class.disabled]="!currentHasAudio"
                [disabled]="!currentHasAudio">
          &#128266;
        </button>
      </div>
      <app-game-keyboard-help
        class="spotlight-keyboard-help"
        [shortcuts]="keyboardShortcuts"
        (openChange)="keyboardHintsVisible = $event"
        title="Keyboard shortcuts">
      </app-game-keyboard-help>
    </div>
  </div>

  <!-- Sandwich Menu (shared component) -->
  <app-sandwich-menu (action)="onMenuAction($event)"></app-sandwich-menu>
</div>
