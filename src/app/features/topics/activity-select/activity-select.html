<div class="min-h-screen bg-gradient-to-br from-purple-50 to-pink-100 p-6">
  <div class="container mx-auto">
    <!-- Header with back button -->
    <div class="flex items-center mb-8">
      <button (click)="goBack()" 
              class="bg-white rounded-full p-2 shadow-md hover:shadow-lg transition mr-4">
        <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
      <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600">
        {{ topicName }} – Activities
      </h1>
    </div>

    <!-- Games Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div *ngFor="let game of games"
           (click)="onGameClick(game)"
           class="relative bg-white rounded-2xl shadow-xl overflow-hidden cursor-pointer transform transition-all duration-300 hover:scale-105 hover:shadow-2xl"
           [class.opacity-40]="selectedGame && selectedGame !== game"
           [class.ring-4]="selectedGame === game"
           [class.ring-purple-500]="selectedGame === game">
        
        <!-- Game Icon -->
        <div class="h-32 bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center">
          <span class="text-6xl">{{ game.icon }}</span>
        </div>
        
        <!-- Game Info -->
        <div class="p-5">
          <h3 class="text-xl font-bold text-gray-800 mb-2">{{ game.name }}</h3>
          <p class="text-gray-500 text-sm">{{ game.description }}</p>
        </div>

        <!-- Settings indicator (if needed) -->
        <div *ngIf="game.requiresSettings" 
             class="absolute top-2 right-2 bg-yellow-400 text-xs text-white px-2 py-1 rounded-full">
          settings
        </div>
      </div>
    </div>

    <!-- Settings Panel (slides in) -->
    <div *ngIf="selectedGame && showSettings"
         class="fixed inset-y-0 right-0 w-96 bg-white shadow-2xl p-6 transform transition-transform duration-500 ease-in-out overflow-y-auto"
         [class.translate-x-0]="showSettings"
         [class.translate-x-full]="!showSettings">
      
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">{{ selectedGame.name }} Settings</h2>
        <button (click)="cancelSelection()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Settings form -->
      <app-settings-panel [gameId]="selectedGame.id" (settingsChange)="onSettingsChange($event)"></app-settings-panel>

      <div class="flex space-x-3 mt-8">
        <button (click)="startGame()" 
                class="flex-1 bg-gradient-to-r from-green-400 to-blue-500 hover:from-green-500 hover:to-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition transform hover:scale-105">
          Start Game
        </button>
        <button (click)="cancelSelection()" 
                class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-lg shadow transition">
          Cancel
        </button>
      </div>
    </div>

    <!-- Backdrop blur when settings open -->
   <!-- <div *ngIf="selectedGame && showSettings" 
     class="fixed inset-0 bg-black bg-opacity-30 backdrop-blur-sm transition-opacity"
     (click)="cancelSelection()"></div> -->
  </div>
</div>
