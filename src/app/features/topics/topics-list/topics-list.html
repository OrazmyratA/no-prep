<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
  <div class="container mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">
        My Topics
      </h1>
      <button routerLink="/topics/new" 
              class="bg-gradient-to-r from-green-400 to-blue-500 hover:from-green-500 hover:to-blue-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transform transition hover:scale-105">
        + New Topic
      </button>
    </div>

    <!-- Topics Grid -->
    <div *ngIf="(topics$ | async)?.length; else emptyState" 
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div *ngFor="let topic of topics$ | async" 
           class="group relative bg-white rounded-2xl shadow-xl overflow-hidden transform transition-all duration-300 hover:scale-105 hover:shadow-2xl">
        
        <!-- Edit/Delete Buttons (appear on hover) -->
        <div class="absolute top-3 right-3 flex space-x-2 opacity-0 group-hover:opacity-100 transition-opacity z-10">
          <button (click)="editTopic(topic.id!)" 
                  class="bg-yellow-400 hover:bg-yellow-500 text-white p-2 rounded-full shadow-md">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
            </svg>
          </button>
          <button (click)="deleteTopic(topic.id!)" 
                  class="bg-red-500 hover:bg-red-600 text-white p-2 rounded-full shadow-md">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
            </svg>
          </button>
        </div>

        <!-- Topic Content -->
        <div [routerLink]="['/topics', topic.id, 'activities']" class="cursor-pointer p-6">
          <div class="flex items-center justify-between mb-4">
            <div class="w-12 h-12 bg-gradient-to-br from-blue-400 to-purple-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-lg">
              {{ topic.name.charAt(0).toUpperCase() }}
            </div>
            <span class="text-xs text-gray-400">{{ topic.updatedAt | date:'mediumDate' }}</span>
          </div>
          <h3 class="text-xl font-bold text-gray-800 mb-2">{{ topic.name }}</h3>
          <!-- <p class="text-gray-500 text-sm">{{ topic.itemCount || 0 }} items</p> -->
          <!-- Progress bar or additional info can go here -->
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <ng-template #emptyState>
      <div class="text-center py-20">
        <div class="text-8xl mb-4">📚</div>
        <h2 class="text-2xl font-semibold text-gray-600 mb-2">No topics yet</h2>
        <p class="text-gray-500 mb-6">Create your first topic to get started</p>
        <button routerLink="/topics/new" 
                class="bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105">
          + Create Topic
        </button>
      </div>
    </ng-template>
  </div>
</div>
