    <div class="container mx-auto p-4">
      <h1 class="text-3xl font-bold mb-6">{{ isEdit ? 'Edit' : 'Create' }} Topic</h1>
      <form [formGroup]="topicForm" (ngSubmit)="onSubmit()" class="max-w-2xl">
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">Topic Name</label>
          <input type="text" formControlName="name" class="shadow appearance-none border rounded w-full py-2 px-3">
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">Items</label>
          <div formArrayName="items">
            <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="flex items-start space-x-2 mb-2">
              <div class="flex-1">
                <input type="text" formControlName="text" placeholder="Text (optional)" class="w-full border p-2">
              </div>
              <div class="flex-1">
               <app-image-uploader 
                  [initialImage]="item.get('image')?.value" 
                  (imageSelected)="onImageSelected($event, i)">
                </app-image-uploader>
              </div>
              <button type="button" (click)="removeItem(i)" class="text-red-500">✖</button>
            </div>
          </div>
          <button type="button" (click)="addItem()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded">+ Add Item</button>
        </div>

        <div class="flex space-x-4">
          <button type="submit" [disabled]="topicForm.invalid" class="bg-green-500 text-white px-4 py-2 rounded disabled:opacity-50">Save</button>
          <button type="button" (click)="goBack()" class="bg-gray-500 text-white px-4 py-2 rounded">Cancel</button>
        </div>
      </form>
    </div>
