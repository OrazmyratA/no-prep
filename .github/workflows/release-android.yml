name: Release — Android AAB

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build signed Android AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: npm ci

      - name: Angular production build + Capacitor sync
        run: npm run android:sync

      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/noprep-release.jks

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties << PROPS
          storeFile=noprep-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS

      - name: Build release AAB
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease

      - name: Upload AAB to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
